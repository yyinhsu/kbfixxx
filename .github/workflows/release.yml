name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Zip app bundle
        run: zip -r kbfixxx.app.zip kbfixxx.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: kbfixxx.app.zip
          generate_release_notes: true
